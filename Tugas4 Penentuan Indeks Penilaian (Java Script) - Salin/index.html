<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Cek Nilai Mahasiswa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Program Cek Nilai Mahasiswa</h2>

        <div class="form-group">
            <label for="nama">Nama:</label>
            <input type="text" id="nama" placeholder="Masukkan nama Anda">
        </div>

        <div class="form-group">
            <label for="nim">NIM:</label>
            <input type="number" id="nim" placeholder="Masukkan NIM Anda">
        </div>

         <div class="form-group">
            <label for="nilai">Nilai:</label>
            <input type="number" id="nilai" placeholder="Masukkan Nilai (0-100) Anda" min="0" max="100">
        </div>


        <button id="btnCek" class="btn">Cek Nilai</button>

        <div id="hasil" class="result-box"></div>
    </div>

    <script src="java.js"></script>
